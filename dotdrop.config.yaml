config:
  # create a backup of the existing destination
  backup: true
  # do not display the `dotdrop` banner
  banner: false
  # create a directory hierarchy when installing dotfiles if it doesn't exist
  create: true
  # path to the directory containing the dotfiles to be managed by `dotdrop`
  dotpath: dotfiles
  # preserve leading dot when importing hidden file in the `dotpath`
  keepdot: false
  # do not link files and copy them instead
  link_dotfile_default: nolink
  link_on_import: nolink
  # use long keys for dotfiles when importing
  longkey: false
  # execute the next actions for any dotfile installation
  default_actions:
    - bat
    - wallpapers

actions:
  post:
    # compile `bat` themes
    bat: bat cache --build
    # set theme for`fast-syntax-highlighting`
    fzh: zsh -ic "fast-theme XDG:themes/catppuccin_macchiato"
    # set wallpapers
    wallpapers: osascript -e 'tell application "System Events" to set picture of every desktop to "~/.wallpapers/logo/logo_0.png"'

dotfiles:
  # =================================================
  # ~/
  # =================================================

  d_ipython:
    dst: ~/.ipython
    src: .ipython
  d_jupyterlab:
    dst: ~/.jupyter/lab/user-settings
    src: .jupyter/lab/user-settings
  d_shell:
    dst: ~/.shell
    src: .shell
  d_wallpapers:
    dst: ~/.wallpapers
    src: ../wallpapers

  f_gitconfig:
    dst: ~/.gitconfig
    src: .gitconfig
  f_gnupg:
    dst: ~/.gnupg/gpg-agent.conf
    src: .gnupg/gpg-agent.conf
  f_ssh:
    dst: ~/.ssh/config
    src: .ssh/config
  f_zplugrc:
    dst: ~/.zplugrc
    src: .zplugrc
  f_zshrc:
    dst: ~/.zshrc
    src: .zshrc

  # =================================================
  # ~/.config
  # =================================================

  d_aerospace:
    dst: ~/.config/aerospace
    src: .config/aerospace
  d_bat:
    dst: ~/.config/bat
    src: .config/bat
  d_borders:
    dst: ~/.config/borders
    src: .config/borders
  d_bottom:
    dst: ~/.config/bottom
    src: .config/bottom
  d_delta:
    dst: ~/.config/delta
    src: .config/delta
  d_fsh:
    dst: ~/.config/fsh
    src: .config/fsh
  d_helix:
    dst: ~/.config/helix
    src: .config/helix
  d_iterm2:
    dst: ~/.config/iterm2
    src: .config/iterm2
  d_k9s:
    dst: ~/.config/k9s
    src: .config/k9s
  d_karabiner:
    dst: ~/.config/karabiner
    src: .config/karabiner
  d_lazygit:
    dst: ~/.config/lazygit
    src: .config/lazygit
  d_neofetch:
    dst: ~/.config/neofetch
    src: .config/neofetch
  d_sketchybar:
    dst: ~/.config/sketchybar
    src: .config/sketchybar
  d_stylus:
    dst: ~/.config/stylus
    src: .config/stylus
  d_yazi:
    dst: ~/.config/yazi
    src: .config/yazi
  d_zellij:
    dst: ~/.config/zellij
    src: .config/zellij

  f_starship:
    dst: ~/.config/starship.toml
    src: .config/starship.toml
  f_zed:
    dst: ~/.config/zed/settings.json
    src: .config/zed/settings.json

  # =================================================
  # ~/Library/Application Support
  # =================================================

  d_macos_espanso:
    dst: ~/Library/Application Support/espanso
    src: espanso
  d_macos_pypoetry:
    dst: ~/Library/Application Support/pypoetry
    src: pypoetry

  f_macos_vscode:
    dst: ~/Library/Application Support/Code/User/settings.json
    src: vscode/settings.json

profiles:
  macos:
    dotfiles:
      # ~/
      - d_ipython
      - d_jupyterlab
      - d_shell
      - d_wallpapers
      - f_gitconfig
      - f_gnupg
      - f_ssh
      - f_zplugrc
      - f_zshrc
      # ~/.config
      - d_aerospace
      - d_bat
      - d_borders
      - d_bottom
      - d_delta
      - d_fsh
      - d_helix
      - d_iterm2
      - d_k9s
      - d_karabiner
      - d_lazygit
      - d_neofetch
      - d_sketchybar
      - d_stylus
      - d_yazi
      - d_zellij
      - f_starship
      - f_zed
      # ~/Library/Application Support
      - d_macos_espanso
      - d_macos_pypoetry
      - f_macos_vscode
