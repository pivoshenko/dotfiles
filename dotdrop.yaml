config:
  backup: false
  banner: true
  create: true
  keepdot: false
  longkey: false
  dotpath: dotfiles
  link_dotfile_default: nolink
  link_on_import: nolink

profiles:
  base:
    dotfiles:
      - d_bat
      - d_borders
      - d_bottom
      - d_delta
      - d_efm_langserver
      - d_espanso
      - d_fsh
      - d_helix
      - d_iterm
      - d_k9s
      - d_karabiner
      - d_lazygit
      - d_local_bin
      - d_neofetch
      - d_pypoetry
      - d_shell
      - d_sketchybar
      - d_skhd
      - d_spotify_tui
      - d_yabai
      - d_yamllint
      - d_yazi
      - d_zellij
      - d_zellij_plugins
      - f_aerospace
      - f_gitconfig
      - f_gnupg_agent
      - f_ipython_config
      - f_ipython_startup
      - f_jupyter_catppuccin
      - f_jupyter_themes
      - f_starship
      - f_ssh_config
      - f_vscode
      - f_zplugrc
      - f_zshenv
      - f_zshrc

dotfiles:

# =============================================================================================
# ~/.config
# =============================================================================================

  d_bat:
    dst: ~/.config/bat
    src: .config/bat

  d_borders:
    dst: ~/.config/borders
    src: .config/borders

  d_bottom:
    dst: ~/.config/bottom
    src: .config/bottom

  d_delta:
    dst: ~/.config/delta
    src: .config/delta

  d_efm_langserver:
    dst: ~/.config/efm-langserver
    src: .config/efm-langserver

  d_fsh:
    dst: ~/.config/fsh
    src: .config/fsh

  d_helix:
    dst: ~/.config/helix
    src: .config/helix

  d_k9s:
    dst: ~/.config/k9s
    src: .config/k9s

  d_karabiner:
    dst: ~/.config/karabiner
    src: .config/karabiner

  d_lazygit:
    dst: ~/.config/lazygit
    src: .config/lazygit

  d_neofetch:
    dst: ~/.config/neofetch
    src: .config/neofetch

  d_sketchybar:
    dst: ~/.config/sketchybar
    src: .config/sketchybar

  d_skhd:
    dst: ~/.config/skhd
    src: .config/skhd

  d_spotify_tui:
    dst: ~/.config/spotify-tui
    src: .config/spotify-tui

  d_yabai:
    dst: ~/.config/yabai
    src: .config/yabai

  d_yamllint:
    dst: ~/.config/yamllint
    src: .config/yamllint

  d_yazi:
    dst: ~/.config/yazi
    src: .config/yazi

  d_zellij:
    dst: ~/.config/zellij
    src: .config/zellij

  f_starship:
    dst: ~/.config/starship.toml
    src: .config/starship.toml

# =============================================================================================
# ~/
# =============================================================================================

  d_iterm:
    dst: ~/.iterm
    src: .iterm

  d_local_bin:
    dst: ~/.local/bin
    src: .local/bin

  d_shell:
    dst: ~/.shell
    src: .shell

  d_zellij_plugins:
    dst: ~/zellij-plugins
    src: zellij-plugins

  f_aerospace:
    dst: ~/.aerospace.toml
    src: .aerospace.toml

  f_gitconfig:
    dst: ~/.gitconfig
    src: .gitconfig

  f_gnupg_agent:
    dst: ~/.gnupg/gpg-agent.conf
    src: .gnupg/gpg-agent.conf

  f_ipython_config:
    dst: ~/.ipython/profile_default/ipython_config.py
    src: .ipython/profile_default/ipython_config.py

  f_ipython_startup:
    dst: ~/.ipython/profile_default/startup/start.py
    src: .ipython/profile_default/startup/start.py

  f_jupyter_catppuccin:
    dst: ~/.jupyter/lab/user-settings/catppuccin_jupyterlab/plugin.jupyterlab-settings
    src: .jupyter/lab/user-settings/catppuccin_jupyterlab/plugin.jupyterlab-settings

  f_jupyter_themes:
    dst: ~/.jupyter/lab/user-settings/@jupyterlab/apputils-extension/themes.jupyterlab-settings
    src: .jupyter/lab/user-settings/@jupyterlab/apputils-extension/themes.jupyterlab-settings

  f_ssh_config:
    dst: ~/.ssh/config
    src: .ssh/config

  f_zplugrc:
    dst: ~/.zplugrc
    src: .zplugrc

  f_zshenv:
    dst: ~/.zshenv
    src: .zshenv

  f_zshrc:
    dst: ~/.zshrc
    src: .zshrc

# =============================================================================================
# ~/Library
# =============================================================================================

  d_espanso:
    dst: "~/Library/Application Support/espanso"
    src: espanso

  d_pypoetry:
    dst: "~/Library/Application Support/pypoetry"
    src: pypoetry

  f_vscode:
    dst: "~/Library/Application Support/Code/User/settings.json"
    src: vscode/settings.json
